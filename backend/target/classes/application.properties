server.port=8080
spring.application.name=demo-app
management.endpoints.web.exposure.include=health,info

# SQLite datasource. Override the file location with the DB_PATH env var;
# defaults to /app/data/app.db, the path expected inside the Docker container.
spring.datasource.url=jdbc:sqlite:${DB_PATH:/app/data/app.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Avoid Spring Boot trying to validate the connection pool against SQLite in a way it doesn't like
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=1
