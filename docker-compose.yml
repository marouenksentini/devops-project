version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devops-project-backend
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/data/app.db
    volumes:
      - devops-project-sqlite-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: devops-project-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  devops-project-sqlite-data:

networks:
  default:
    name: devops-project-network
